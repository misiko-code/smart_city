{% extends 'base.html' %}

{% block title %}
  View Buildings
{% endblock %}

{% block content %}
  <head>
    <style>
      .container-box {
        margin-top: 40px;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        padding: 20px;
      }
      .btn-yellow {
        background-color: #ffd700;
        border-color: #ffd700;
        color: black;
        font-weight: bold;
      }
      .btn-yellow:hover {
        background-color: #e6be00;
        border-color: #e6be00;
      }
    </style>
  </head>
  <body>
    <div class="row mb-4">
      <div class="col text-center">
        <h2>Manage Buildings</h2>
        <h2>View Buildings</h2>
      </div>
    </div>
    <div class="container-box text-center">
      <h4 class="mb-4">Calculate Volume of Wall&Roof</h4>

      <div class="mb-3">
        <select id="material" class="form-select">
          <option value="concrete">Concrete</option>
          <option value="wood">Wood</option>
        </select>
      </div>

      <div class="mb-3">
        <input type="text" id="areaInput" class="form-control" placeholder="Area of Wall&Roof" />
      </div>

      <button id="toggleBtn" class="toggle btn-yellow">Calculate / Toggle lock</button>

      <div id="result" class="mt-4"></div>
    </div>
  </body>
{% endblock %}
{% block scripts %}
  <script>
    document.getElementById('toggleBtn').addEventListener('click', async () => {
      const material = document.getElementById('material').value
      const area = parseFloat(document.getElementById('areaInput').value)
      const volume = area * 5
      const resultDiv = document.getElementById('result')

      const res = await fetch('/buildings/toggle_lock', { method: 'POST' })
      const data = await res.json()
      resultDiv.innerHTML = `
            <div class="alert alert-info">
              <p><strong>Material:</strong> ${material}</p>
              <p><strong>Volume:</strong> ${volume} m³</p>
              <p><strong>Lock status:</strong> ${data.new_status}</p>
            </div>`
    })
  </script>
{% endblock %}
