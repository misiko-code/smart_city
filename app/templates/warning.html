{% extends 'base.html' %}

{% block title %}
  View Buildings
{% endblock %}

{% block content %}
  <head>
    <style>
      .container-box {
        margin-top: 40px;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        padding: 20px;
      }
      .btn-yellow {
        background-color: #ffd700;
        border-color: #ffd700;
        color: black;
        font-weight: bold;
      }
      .btn-yellow:hover {
        background-color: #e6be00;
        border-color: #e6be00;
      }
    </style>
  </head>
  <body>
    <div class="row mb-4">
      <div class="col text-center">
        <h2>Manage Buildings</h2>
        <h2>View Buildings</h2>
      </div>
    </div>
    <div class="container-box text-center">
      <h2 class="mb-4">Warning! Warning! Another User is Editing the document</h2>

      <div class="mb-3">
        <select id="material" class="form-select">
          <option value="concrete">Concrete</option>
          <option value="wood">Wood</option>
        </select>
      </div>

      <div class="mb-3">
        <p>Area of Wall&Roof - Locked </p>
      </div>

      <button id="toggleBtn" class="toggle btn-yellow">Click to Unlock</button>

      <div id="result" class="mt-4"></div>
    </div>
  </body>
{% endblock %}
{% block scripts %}
  <script>
    document.getElementById('toggleBtn').addEventListener('click', async () => {
      const res = await fetch('/buildings/toggle_lock', { method: 'POST' })
      const data = await res.json()
      const resultDiv = document.getElementById('result')

      resultDiv.innerHTML = `
            <div class="alert alert-info">
              <p><strong>Lock status:</strong> ${data.new_status}</p>
              <p><strong>Refresh the page to edit</strong></p>
            </div>`
      return
    })
  </script>
{% endblock %}
